<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>weather app</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="card">
         <div class="search">
            <input type="text" placeholder="enter city name" spellcheck="false">
            <button><img src="images/search.png" alt="search"></button>
         </div>

         <div class="weather">
            <img src="images/rain.png" class="weather-icon">
            <h2 class="temperature">25°c</h2>
            <h3 class="city">Newyork</h3>
            <div class="details">
                <div class="col">
                    <img src="images/humidity.png" alt="humidity">
                    <div class="humidity">
                        <p>Humidity</p>
                        <h2>60%</h2>
                    </div>
                </div>
                <div class="col">
                    <img src="images/wind.png" alt="wind">
                    <div class="wind">
                        <p>Wind Speed</p>
                        <h2>10 km/h</h2>
                    </div>
                </div>
            </div>

         </div>
    </div>

    <script>
        const apiKey = "cced6d2bdfbf8e31f9c82caf2846de59"
        const apiUrl = "https://api.openweathermap.org/data/2.5/weather?q=germany&units=metric" ;

        async function checkWeather() {

            const response = await fetch(apiUrl + "&appid=" + apiKey);
            var data = await response.json();
            console.log(data);

            document.querySelector(".city").innerHTML = data.name;
            document.querySelector(".temperature").innerHTML = Math.round(data.main.temp) + "°c";
            document.querySelector(".humidity h2").innerHTML = data.main.humidity + "%";
            document.querySelector(".wind h2").innerHTML = data.wind.speed + " km/h";

        }

        checkWeather();
    </script>
</body>
</html>
